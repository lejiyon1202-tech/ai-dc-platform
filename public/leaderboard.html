<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DC — 성장 여정 리더보드</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    body { padding: var(--sp-xl) var(--sp-lg); max-width: 760px; margin: 0 auto; }

    .lb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-xl);
    }
    .lb-title { font-size: var(--fs-xl); font-weight: var(--fw-bold); }
    .lb-sub   { font-size: var(--fs-sm); color: var(--text-secondary); margin-top: 4px; }
    .cohort-tag {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      background: var(--track-bg);
      border: var(--border-base);
      font-size: var(--fs-xs);
      color: var(--text-secondary);
    }

    .my-rank-card {
      background: var(--bg-card);
      border: var(--border-accent);
      border-radius: var(--radius-lg);
      padding: var(--sp-lg) var(--sp-xl);
      display: flex;
      align-items: center;
      gap: var(--sp-xl);
      margin-bottom: var(--sp-xl);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-glow);
    }
    .my-rank-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at left, var(--accent-soft), transparent 65%);
      pointer-events: none;
    }
    .my-rank-num {
      font-size: var(--fs-2xl);
      font-weight: var(--fw-bold);
      color: var(--accent);
      line-height: 1;
      min-width: 48px;
    }
    .my-rank-info { flex: 1; }
    .my-rank-name { font-size: var(--fs-lg); font-weight: var(--fw-bold); }
    .my-rank-sub  { font-size: var(--fs-sm); color: var(--text-secondary); margin-top: 2px; }
    .my-rank-xp   { font-size: var(--fs-xl); font-weight: var(--fw-bold); color: var(--accent); }
    .my-rank-xp-label { font-size: var(--fs-xs); color: var(--text-muted); text-align: right; }

    .lb-list { display: flex; flex-direction: column; gap: 6px; }
    .lb-item {
      display: flex;
      align-items: center;
      gap: var(--sp-md);
      padding: var(--sp-sm) var(--sp-md);
      border-radius: var(--radius-md);
      background: var(--bg-card);
      border: var(--border-base);
      box-shadow: var(--shadow-sm);
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
    }
    .lb-item:hover {
      background: var(--bg-card-hover);
      border-color: var(--bc-hover);
      box-shadow: var(--shadow-card-hover);
    }
    .lb-item.is-me {
      border-color: var(--accent-border);
      background: var(--accent-subtle);
    }
    .lb-rank {
      width: 28px;
      font-size: var(--fs-sm);
      font-weight: var(--fw-bold);
      color: var(--text-muted);
      text-align: center;
    }
    .lb-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--fs-xs);
      font-weight: var(--fw-bold);
      color: var(--text-primary);
      flex-shrink: 0;
    }
    .lb-name    { flex: 1; font-size: var(--fs-sm); font-weight: var(--fw-medium); }
    .lb-team    { font-size: var(--fs-xs); color: var(--text-muted); min-width: 80px; text-align: right; }
    .lb-xp      { font-size: var(--fs-sm); font-weight: var(--fw-bold); color: var(--accent); min-width: 80px; text-align: right; }
    .lb-delta {
      font-size: var(--fs-xs);
      padding: 2px 6px;
      border-radius: var(--radius-pill);
      min-width: 44px;
      text-align: center;
    }
    .delta-up   { background: color-mix(in srgb, var(--comp-3) 12%, transparent); color: var(--comp-3); }
    .delta-down { background: color-mix(in srgb, var(--comp-5) 10%, transparent); color: var(--comp-5); }
    .delta-same { background: var(--overlay-xs); color: var(--text-muted); }

    @media (max-width: 560px) {
      .lb-header { flex-direction: column; align-items: flex-start; gap: var(--sp-sm); }
      .lb-team { display: none; }
    }

    .award-icon { width: 28px; display: flex; align-items: center; justify-content: center; }
    .award-icon svg { width: 20px; height: 20px; display: block; }
    .is-gold .award-icon   { color: var(--accent); filter: drop-shadow(0 0 6px rgba(200,169,110,0.65)); }
    .is-silver .award-icon { color: var(--medal-silver); }
    .is-bronze .award-icon { color: var(--medal-bronze); }
    .growth-wrap { flex-shrink: 0; color: var(--accent); opacity: 0.65; }
    .growth-wrap svg { width: 38px; height: 38px; }
  </style>
</head>
<body>

<div class="lb-header">
  <div>
    <div class="lb-title">성장 여정 리더보드</div>
    <div class="lb-sub">동료 코호트 함께 성장하는 여정 · 2026년 2분기</div>
  </div>
  <div class="cohort-tag">24명 참여</div>
</div>

<div class="my-rank-card">
  <!-- 성장 트렌드 아이콘 -->
  <div class="growth-wrap" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="2,17 8,11 13,14 22,4"/>
      <polyline points="17,4 22,4 22,9"/>
      <circle cx="8" cy="11" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="13" cy="14" r="1.5" fill="currentColor" stroke="none"/>
    </svg>
  </div>
  <div class="my-rank-num">7위</div>
  <div class="my-rank-info">
    <div class="my-rank-name">김민준</div>
    <div class="my-rank-sub">영업2팀 팀장 · Lv.7 성장 중</div>
  </div>
  <div>
    <div class="my-rank-xp">3,240</div>
    <div class="my-rank-xp-label">역량 XP</div>
  </div>
</div>

<div class="section-title">동료 성장 현황 (전체 순위)</div>
<div class="lb-list" id="lbList"></div>

<script>
const BASE='https://sbi.3.39.80.158.nip.io';
const uid=new URLSearchParams(location.search).get('u')||'learner-demo';
const css=getComputedStyle(document.documentElement);
const cv=k=>css.getPropertyValue(k).trim();
const colors=['--comp-1','--comp-3','--comp-2','--comp-4','--comp-9','--comp-6','--comp-7'].map(cv);
const SVG_TOP1=`<svg aria-hidden="true" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><polygon points="11,2 13.8,7.6 20,8.6 15.5,13 16.6,19.2 11,16.2 5.4,19.2 6.5,13 2,8.6 8.2,7.6"/></svg>`;
const SVG_TOP2=`<svg aria-hidden="true" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><polyline points="8,13 11,7 14,13"/><line x1="11" y1="7" x2="11" y2="15"/></svg>`;
const SVG_TOP3=`<svg aria-hidden="true" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><circle cx="11" cy="11" r="3" fill="currentColor" stroke="none"/></svg>`;
let entries=[
  {rank:1,name:'이서연',team:'영업1팀',xp:4850,delta:'+2',dir:'up',me:false},
  {rank:2,name:'박준혁',team:'전략기획팀',xp:4620,delta:'—',dir:'same',me:false},
  {rank:3,name:'최지은',team:'HR팀',xp:4380,delta:'+1',dir:'up',me:false},
  {rank:4,name:'정태양',team:'영업3팀',xp:4100,delta:'-1',dir:'down',me:false},
  {rank:5,name:'강하늘',team:'마케팅팀',xp:3890,delta:'+3',dir:'up',me:false},
  {rank:6,name:'오소망',team:'운영팀',xp:3510,delta:'—',dir:'same',me:false},
  {rank:7,name:'김민준',team:'영업2팀',xp:3240,delta:'+1',dir:'up',me:true},
  {rank:8,name:'류다은',team:'고객팀',xp:3100,delta:'-2',dir:'down',me:false},
  {rank:9,name:'신도연',team:'개발팀',xp:2950,delta:'+1',dir:'up',me:false},
  {rank:10,name:'임지호',team:'영업1팀',xp:2730,delta:'—',dir:'same',me:false},
];
function renderBoard(data){
  const list=document.getElementById('lbList'); list.innerHTML='';
  data.forEach((e,i)=>{
    const bg=colors[i%colors.length];
    const dCls=e.dir==='up'?'delta-up':e.dir==='down'?'delta-down':'delta-same';
    const icon=e.rank===1?SVG_TOP1:e.rank===2?SVG_TOP2:e.rank===3?SVG_TOP3:null;
    const rCls=e.rank===1?'is-gold':e.rank===2?'is-silver':e.rank===3?'is-bronze':'';
    list.insertAdjacentHTML('beforeend',`<div class="lb-item ${e.me?'is-me':''} ${rCls}">${icon?`<div class="award-icon" aria-hidden="true">${icon}</div>`:`<div class="lb-rank" aria-label="${e.rank}위">${e.rank}</div>`}<div class="lb-avatar" style="background:${bg}" aria-hidden="true">${e.name.slice(0,1)}</div><div class="lb-name">${e.name}${e.me?' <span style="font-size:10px;color:var(--accent)">나</span>':''}</div><div class="lb-team">${e.team}</div><div class="lb-xp" aria-label="${e.xp.toLocaleString()} XP">${e.xp.toLocaleString()}</div><div class="lb-delta ${dCls}" aria-label="순위 변동 ${e.delta}">${e.delta}</div></div>`);
  });
}
(async()=>{
  try{
    const d=await(await fetch(`${BASE}/api/stats/cohort/all`)).json();
    if(d.leaderboard?.length) entries=d.leaderboard.map(e=>({rank:e.rank,name:e.userName||e.userId,team:'AI DC',xp:e.xp,delta:'—',dir:'same',me:e.userId===uid}));
  }catch(e){}
  renderBoard(entries);
})();
</script>
</body>
</html>
