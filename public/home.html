<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DC — 역량 개발 센터</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { margin: 0; }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,247,251,0.92);
      backdrop-filter: blur(12px);
      border-bottom: var(--border-base);
      padding: 0 var(--sp-xl);
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-logo { font-size: var(--fs-md); font-weight: var(--fw-bold); color: var(--accent); letter-spacing: -0.02em; }
    .nav-logo span { color: var(--text-primary); }
    .nav-cta {
      padding: 8px 20px;
      background: var(--accent);
      color: var(--text-on-accent);
      border: none;
      border-radius: var(--radius-pill);
      font-size: var(--fs-sm);
      font-weight: var(--fw-bold);
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .nav-cta:hover { opacity: 0.88; }

    /* ── Hero ── */
    .hero {
      padding: 80px var(--sp-xl) 60px;
      max-width: 900px; margin: 0 auto;
      text-align: center;
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px;
      background: var(--accent-dim);
      border: var(--border-accent);
      border-radius: var(--radius-pill);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      color: var(--accent);
      margin-bottom: var(--sp-lg);
      letter-spacing: 0.04em;
    }
    .hero-title {
      font-size: 42px;
      font-weight: var(--fw-bold);
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: var(--sp-md);
      letter-spacing: -0.03em;
    }
    .hero-title em { color: var(--accent); font-style: normal; }
    .hero-desc {
      font-size: var(--fs-md);
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 560px; margin: 0 auto var(--sp-xl);
    }
    .hero-actions { display: flex; gap: var(--sp-md); justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      padding: 14px 32px;
      background: var(--accent);
      color: var(--text-on-accent); border: none;
      border-radius: var(--radius-pill);
      font-size: var(--fs-base);
      font-weight: var(--fw-bold);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(184,146,58,0.35);
      transition: opacity var(--transition), transform var(--transition);
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-secondary {
      padding: 14px 32px;
      background: var(--bg-card);
      color: var(--text-primary);
      border: var(--border-base);
      border-radius: var(--radius-pill);
      font-size: var(--fs-base);
      font-weight: var(--fw-medium);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .btn-secondary:hover { border-color: var(--bc-hover); box-shadow: var(--shadow-card-hover); }

    /* ── Stat Row ── */
    .stat-row {
      display: flex; gap: var(--sp-xl); justify-content: center;
      margin: var(--sp-xl) auto;
      max-width: 600px;
    }
    .stat-item { text-align: center; }
    .stat-num { font-size: var(--fs-xl); font-weight: var(--fw-bold); color: var(--accent); }
    .stat-label { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 2px; }

    /* ── Sim Cards ── */
    .section { padding: var(--sp-xl) var(--sp-lg); max-width: 900px; margin: 0 auto; }
    .section-heading {
      text-align: center;
      font-size: var(--fs-xl);
      font-weight: var(--fw-bold);
      margin-bottom: 6px;
    }
    .section-sub {
      text-align: center;
      font-size: var(--fs-sm);
      color: var(--text-secondary);
      margin-bottom: var(--sp-xl);
    }
    .sim-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--sp-md);
    }
    .sim-card {
      background: var(--bg-card);
      border: var(--border-base);
      border-radius: var(--radius-lg);
      padding: var(--sp-lg);
      box-shadow: var(--shadow-card);
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      cursor: pointer;
    }
    .sim-card:hover {
      border-color: var(--bc-hover);
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-2px);
    }
    .sim-icon-wrap {
      width: 48px; height: 48px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin-bottom: var(--sp-md);
    }
    .sim-title { font-size: var(--fs-base); font-weight: var(--fw-bold); margin-bottom: 4px; }
    .sim-desc  { font-size: var(--fs-sm); color: var(--text-secondary); line-height: 1.5; }
    .sim-comp-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: var(--sp-sm); }
    .sim-comp-tag {
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
    }

    @media (max-width: 620px) {
      .hero-title { font-size: 28px; }
      .sim-cards { grid-template-columns: 1fr; }
      .stat-row { flex-direction: column; gap: var(--sp-md); }
      .nav { padding: 0 var(--sp-md); }
    }
  </style>
</head>
<body>

<nav class="nav" role="navigation" aria-label="주 메뉴">
  <div class="nav-logo">AI <span>DC</span></div>
  <button class="nav-cta" aria-label="시작하기">시작하기</button>
</nav>

<section class="hero" aria-label="히어로 섹션">
  <div class="hero-tag" aria-hidden="true">
    <i class="ph ph-sparkle" aria-hidden="true"></i>
    Development Center · 역량 개발 플랫폼
  </div>
  <h1 class="hero-title">
    AI와 함께하는<br><em>역량 성장 여정</em>
  </h1>
  <p class="hero-desc">
    4가지 AI 시뮬레이션으로 12역량을 개발하세요.
    실전과 같은 상황에서 피드백을 받고, 성장 여정을 함께합니다.
  </p>
  <div class="hero-actions">
    <button class="btn-primary" aria-label="학습 시작하기">
      <i class="ph ph-arrow-right" aria-hidden="true"></i>
      학습 시작하기
    </button>
    <button class="btn-secondary" aria-label="소개 보기">소개 보기</button>
  </div>
</section>

<div class="stat-row" role="region" aria-label="주요 수치">
  <div class="stat-item">
    <div class="stat-num">4종</div>
    <div class="stat-label">AI 시뮬레이션</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">12개</div>
    <div class="stat-label">역량 측정</div>
  </div>
  <div class="stat-item">
    <div class="stat-num">실시간</div>
    <div class="stat-label">AI 피드백</div>
  </div>
</div>

<section class="section" aria-label="시뮬레이션 소개" id="simGrid"></section>

<script>
const sims = [
  {
    title: 'AI In-Basket',
    desc: '실제 업무 이메일과 문서를 분석하고 우선순위를 결정하는 의사결정 시뮬.',
    icon: 'ph-tray',
    color: 'var(--sim-inbasket)',
    comps: ['의사결정', '전략적 사고'],
  },
  {
    title: 'AI Role-Playing',
    desc: '코칭 트레이너 시뮬레이션 — 팀원과의 피드백 대화를 AI와 실전 연습.',
    icon: 'ph-chats-circle',
    color: 'var(--sim-roleplay)',
    comps: ['코칭·육성', '갈등 해결'],
  },
  {
    title: 'AI Presentation',
    desc: 'AI Canvas 도구로 발표를 구성하고 실시간 청중 반응에 대응하는 연습.',
    icon: 'ph-projector-screen',
    color: 'var(--sim-pres)',
    comps: ['커뮤니케이션', '영향력 행사'],
  },
  {
    title: 'AI GD',
    desc: 'AI 참여자들과 그룹 토론을 진행하며 리더십과 설득력을 키우는 시뮬.',
    icon: 'ph-users-three',
    color: 'var(--sim-gd)',
    comps: ['팀 리더십', '커뮤니케이션'],
  },
];

const section = document.getElementById('simGrid');
section.innerHTML = `
  <h2 class="section-heading">4종 AI 시뮬레이션</h2>
  <p class="section-sub">각 시뮬레이션은 실제 업무 상황을 기반으로 설계됩니다</p>
  <div class="sim-cards">
    ${sims.map(s => `
      <div class="sim-card" tabindex="0" role="button" aria-label="${s.title} 시작">
        <div class="sim-icon-wrap" style="background:${s.color}18" aria-hidden="true">
          <i class="ph ${s.icon}" style="color:${s.color}" aria-hidden="true"></i>
        </div>
        <div class="sim-title">${s.title}</div>
        <div class="sim-desc">${s.desc}</div>
        <div class="sim-comp-tags" aria-label="관련 역량">
          ${s.comps.map(c => `
            <span class="sim-comp-tag" style="background:${s.color}15;color:${s.color}">${c}</span>
          `).join('')}
        </div>
      </div>`).join('')}
  </div>`;
</script>
</body>
</html>
