<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DC — 케이스 만들기</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { min-height:100vh; display:flex; flex-direction:column; padding:0; margin:0; background:var(--bg-base); }
    .cc-header { display:flex; align-items:center; gap:var(--sp-md); padding:var(--sp-md) var(--sp-lg); border-bottom:var(--border-base); background:var(--bg-card); flex-shrink:0; }
    .cc-back { width:36px;height:36px;border:var(--border-base);border-radius:var(--radius-md);background:var(--bg-base);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all var(--transition); }
    .cc-back:hover { border-color:var(--bc-hover); }
    .cc-title { font-size:var(--fs-base);font-weight:var(--fw-bold);flex:1; }
    .step-label { font-size:var(--fs-xs);color:var(--text-muted);padding:3px 10px;border-radius:var(--radius-pill);background:var(--accent-dim);border:var(--border-accent);color:var(--accent);font-weight:var(--fw-medium); }
    /* ── Setup ── */
    .cc-setup { flex:1; overflow-y:auto; padding:var(--sp-xl) var(--sp-lg); max-width:600px; margin:0 auto; width:100%; }
    .setup-title { font-size:var(--fs-lg);font-weight:var(--fw-bold);margin-bottom:4px; }
    .setup-sub { font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:var(--sp-xl);line-height:1.6; }
    .setup-field { margin-bottom:var(--sp-lg); }
    .field-label { font-size:var(--fs-sm);font-weight:var(--fw-medium);margin-bottom:var(--sp-sm);display:block; }
    .chip-group { display:flex;flex-wrap:wrap;gap:8px; }
    .chip { padding:6px 14px;border-radius:var(--radius-pill);border:var(--border-base);background:var(--bg-card);font-size:var(--fs-sm);cursor:pointer;transition:all var(--transition);color:var(--text-secondary); }
    .chip:hover { border-color:var(--bc-hover); }
    .chip.selected { background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent);font-weight:var(--fw-medium); }
    .btn-next { width:100%;padding:13px;background:var(--accent);color:var(--text-on-accent);border:none;border-radius:var(--radius-md);font-size:var(--fs-base);font-weight:var(--fw-bold);cursor:pointer;margin-top:var(--sp-md);transition:opacity var(--transition); }
    .btn-next:disabled { opacity:.4;cursor:default; }
    .btn-next:not(:disabled):hover { opacity:.88; }
    /* ── Chat ── */
    .cc-chat { display:none;flex:1;flex-direction:column;overflow:hidden; }
    .cc-msgs { flex:1;overflow-y:auto;padding:var(--sp-lg);display:flex;flex-direction:column;gap:var(--sp-md); }
    .msg-row { display:flex;gap:var(--sp-sm);align-items:flex-end; }
    .msg-row.user { flex-direction:row-reverse; }
    .msg-avatar { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0; }
    .msg-avatar.ai { background:var(--accent-dim);border:var(--border-accent);color:var(--accent); }
    .msg-avatar.user { background:var(--bg-card);border:var(--border-base);color:var(--text-secondary); }
    .msg-bubble { max-width:72%;padding:var(--sp-sm) var(--sp-md);border-radius:var(--radius-lg);font-size:var(--fs-base);line-height:1.6; }
    .msg-bubble.ai { background:var(--bg-card);border:var(--border-base);border-bottom-left-radius:4px; }
    .msg-bubble.user { background:var(--accent);color:var(--text-on-accent);border-bottom-right-radius:4px; }
    .msg-typing { display:flex;gap:4px;padding:10px 14px; }
    .typing-dot { width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:typing 1.2s infinite; }
    .typing-dot:nth-child(2){animation-delay:.2s;}.typing-dot:nth-child(3){animation-delay:.4s;}
    @keyframes typing{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
    .cc-preview { margin:var(--sp-sm) var(--sp-lg);background:var(--bg-card);border:var(--border-accent);border-radius:var(--radius-lg);padding:var(--sp-md) var(--sp-lg);box-shadow:var(--shadow-glow);display:none; }
    .preview-title { font-size:var(--fs-xs);font-weight:var(--fw-medium);color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:var(--sp-sm); }
    .preview-body { font-size:var(--fs-base);color:var(--text-secondary);line-height:1.6;white-space:pre-wrap; }
    .preview-actions { display:flex;gap:var(--sp-sm);margin-top:var(--sp-md);flex-wrap:wrap; }
    .btn-sim { padding:8px 18px;border-radius:var(--radius-pill);border:none;background:var(--accent);color:var(--text-on-accent);font-size:var(--fs-sm);font-weight:var(--fw-bold);cursor:pointer;transition:opacity var(--transition); }
    .btn-sim:hover{opacity:.88;} .btn-sim:disabled{opacity:.4;}
    .btn-retry { padding:8px 16px;border-radius:var(--radius-pill);border:var(--border-base);background:var(--bg-base);color:var(--text-secondary);font-size:var(--fs-sm);cursor:pointer; }
    .cc-input-area { padding:var(--sp-md) var(--sp-lg);border-top:var(--border-base);background:var(--bg-card);display:flex;gap:var(--sp-sm);align-items:flex-end;flex-shrink:0; }
    .cc-input { flex:1;resize:none;border:var(--border-base);border-radius:var(--radius-md);padding:10px 14px;font-size:var(--fs-sm);font-family:var(--font-base);background:var(--bg-base);color:var(--text-primary);min-height:44px;max-height:120px;transition:border-color var(--transition); }
    .cc-input:focus{outline:none;border-color:var(--accent-border);}
    .btn-send { width:44px;height:44px;border:none;border-radius:var(--radius-md);background:var(--accent);color:var(--text-on-accent);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:opacity var(--transition); }
    .btn-send:disabled{opacity:.4;cursor:default;} .btn-send:not(:disabled):hover{opacity:.88;}
  </style>
</head>
<body>

<header class="cc-header">
  <button class="cc-back" onclick="history.back()" aria-label="뒤로가기"><i class="ph ph-arrow-left"></i></button>
  <div class="cc-title">케이스 만들기</div>
  <div class="step-label" id="stepLabel">1단계 · 기본 정보</div>
</header>

<!-- Step 1: 선택 -->
<div class="cc-setup" id="ccSetup">
  <div class="setup-title">기본 정보를 선택해 주세요</div>
  <div class="setup-sub">선택한 정보를 바탕으로 AI가 맞춤형 인바스켓 케이스를 설계합니다.</div>
  <div class="setup-field">
    <label class="field-label">직급 / 역할</label>
    <div class="chip-group" data-field="role_level">
      <div class="chip" data-val="사원·대리">사원·대리</div><div class="chip" data-val="과장">과장</div><div class="chip" data-val="차장">차장</div><div class="chip" data-val="부장">부장</div><div class="chip" data-val="임원·팀장">임원·팀장</div>
    </div>
  </div>
  <div class="setup-field">
    <label class="field-label">산업</label>
    <div class="chip-group" data-field="industry">
      <div class="chip" data-val="제조">제조</div><div class="chip" data-val="금융">금융</div><div class="chip" data-val="IT">IT</div><div class="chip" data-val="유통·물류">유통·물류</div><div class="chip" data-val="서비스">서비스</div><div class="chip" data-val="공공·교육">공공·교육</div>
    </div>
  </div>
  <div class="setup-field">
    <label class="field-label">주요 도전 영역</label>
    <div class="chip-group" data-field="challenge_area">
      <div class="chip" data-val="의사결정·우선순위">의사결정·우선순위</div><div class="chip" data-val="팀원 코칭·육성">팀원 코칭·육성</div><div class="chip" data-val="갈등·관계 조율">갈등·관계 조율</div><div class="chip" data-val="이해관계자 관리">이해관계자 관리</div><div class="chip" data-val="시간·자원 관리">시간·자원 관리</div>
    </div>
  </div>
  <button class="btn-next" id="btnNext" disabled>다음 — AI와 케이스 만들기 <i class="ph ph-arrow-right"></i></button>
</div>

<!-- Step 2: AI 대화 -->
<div class="cc-chat" id="ccChat">
  <div class="cc-msgs" id="msgs"></div>
  <div class="cc-preview" id="preview">
    <div class="preview-title"><i class="ph ph-note-pencil"></i> 케이스 미리보기</div>
    <div class="preview-body" id="previewBody"></div>
    <div class="preview-actions">
      <button class="btn-sim" id="btnStart"><i class="ph ph-play-circle"></i> InBasket으로 시작</button>
      <button class="btn-retry" id="btnRetry"><i class="ph ph-arrow-clockwise"></i> 다시 만들기</button>
    </div>
  </div>
  <div class="cc-input-area">
    <textarea id="ccInput" class="cc-input" placeholder="자유롭게 입력하세요..." rows="1" aria-label="메시지 입력"></textarea>
    <button id="btnSend" class="btn-send" disabled aria-label="전송"><i class="ph ph-paper-plane-tilt"></i></button>
  </div>
</div>

<script>
(async()=>{try{const r=await fetch('/api/auth/me',{credentials:'include'});if(!r.ok)location.href='login.html';}catch(e){location.href='login.html';}})();
const uid=new URLSearchParams(location.search).get('u')||'learner-demo';
const sel={};
document.querySelectorAll('.chip-group').forEach(g=>{
  g.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>{
      g.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));
      c.classList.add('selected');
      sel[g.dataset.field]=c.dataset.val;
      document.getElementById('btnNext').disabled=Object.keys(sel).length<3;
    });
  });
});
document.getElementById('btnNext').addEventListener('click',async()=>{
  document.getElementById('ccSetup').style.display='none';
  const chat=document.getElementById('ccChat');chat.style.display='flex';
  document.getElementById('stepLabel').textContent='2단계 · AI 대화';
  try{
    const r=await fetch('/api/cases',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({simType:'inbasket',...sel}),credentials:'include'});
    const d=await r.json();window._caseId=d.caseId;
  }catch(e){}
  addBubble('assistant',`안녕하세요! 말씀해주신 내용을 바탕으로 **${sel.role_level||''}·${sel.industry||''}·${sel.challenge_area||''}** 상황의 인바스켓 케이스를 함께 만들어 볼게요.\n\n이 상황에서 본인이 가장 우려하는 부분은 무엇인가요? 솔직하게 말씀해 주셔도 됩니다.`);
  document.getElementById('btnSend').disabled=false;
  document.getElementById('ccInput').focus();
});

const msgs=document.getElementById('msgs');
const input=document.getElementById('ccInput');
const btnSend=document.getElementById('btnSend');
const preview=document.getElementById('preview');
let convHistory=[];let caseData=null;let step=0;const STEPS=7;

function addBubble(role,text){
  const isAi=role==='assistant';
  const row=document.createElement('div');
  row.className='msg-row'+(isAi?'':' user');
  row.innerHTML=`<div class="msg-avatar ${isAi?'ai':'user'}" aria-hidden="true"><i class="ph ${isAi?'ph-robot':'ph-user'}"></i></div><div class="msg-bubble ${isAi?'ai':'user'}">${text.replace(/\n/g,'<br>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}</div>`;
  msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){const row=document.createElement('div');row.className='msg-row';row.id='typingRow';row.innerHTML=`<div class="msg-avatar ai" aria-hidden="true"><i class="ph ph-robot"></i></div><div class="msg-bubble ai"><div class="msg-typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;}
function hideTyping(){document.getElementById('typingRow')?.remove();}

async function sendMessage(text){
  btnSend.disabled=true;input.disabled=true;
  convHistory.push({role:'user',content:text});addBubble('user',text);showTyping();
  try{
    const endpoint=window._caseId?`/api/cases/${window._caseId}/chat`:'/api/cases/chat';
    const r=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,messages:convHistory,sessionId:uid,...sel}),credentials:'include'});
    const d=await r.json();hideTyping();
    const reply=d.reply||'';const clean=reply.replace('[CASE_READY]','').trim();
    convHistory.push({role:'assistant',content:clean});addBubble('assistant',clean);
    step=Math.min(step+1,STEPS-1);
    if(d.caseReady&&d.caseData){caseData=d.caseData;step=STEPS-1;preview.style.display='block';document.getElementById('previewBody').textContent=typeof caseData==='string'?caseData:JSON.stringify(caseData,null,2);msgs.scrollTop=msgs.scrollHeight;}
  }catch(e){hideTyping();addBubble('assistant','죄송합니다. 잠시 후 다시 시도해주세요.');}
  input.disabled=false;input.value='';input.style.height='';
  if(!caseData)btnSend.disabled=false;input.focus();
}

document.getElementById('btnStart').addEventListener('click',async()=>{
  if(!caseData)return;document.getElementById('btnStart').disabled=true;
  try{
    const cid=window._caseId;
    const endpoint=cid?`/api/cases/${cid}/finalize`:'/api/cases/finalize';
    const r=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({caseData,simType:'inbasket'}),credentials:'include'});
    const d=await r.json();const caseId=d.caseId||cid;
    const tr=await fetch('/api/auth/iframe-token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({simId:'inbasket'}),credentials:'include'});
    const td=await tr.json();const token=td.token||'';
    location.href=`https://inbasket.3.39.80.158.nip.io?u=${encodeURIComponent(uid)}${token?'&token='+encodeURIComponent(token):''}${caseId?'&caseId='+encodeURIComponent(caseId):''}`;
  }catch(e){document.getElementById('btnStart').disabled=false;alert('시뮬 시작에 실패했습니다.');}
});
document.getElementById('btnRetry').addEventListener('click',()=>{
  document.getElementById('ccChat').style.display='none';document.getElementById('ccSetup').style.display='block';
  document.getElementById('stepLabel').textContent='1단계 · 기본 정보';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
  Object.keys(sel).forEach(k=>delete sel[k]);
  document.getElementById('btnNext').disabled=true;
  convHistory=[];caseData=null;step=0;msgs.innerHTML='';preview.style.display='none';window._caseId=null;
});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';btnSend.disabled=!input.value.trim();});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(input.value.trim())btnSend.click();}});
btnSend.addEventListener('click',()=>{const text=input.value.trim();if(!text)return;sendMessage(text);});
</script>
</body>
</html>
