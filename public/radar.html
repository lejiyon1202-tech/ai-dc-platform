<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DC — 역량 레이더</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    body { padding: var(--sp-xl) var(--sp-lg); max-width: 860px; margin: 0 auto; }

    /* ── Header ── */
    .rd-header { margin-bottom: var(--sp-xl); }
    .rd-title  { font-size: var(--fs-xl); font-weight: var(--fw-bold); }
    .rd-sub    { font-size: var(--fs-sm); color: var(--text-secondary); margin-top: 4px; }

    /* ── Period Tabs ── */
    .period-tabs {
      display: flex;
      gap: 6px;
      margin-top: var(--sp-md);
    }
    .period-tab {
      padding: 5px 14px;
      border-radius: var(--radius-pill);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      border: var(--border-base);
      background: var(--bg-card);
      color: var(--text-muted);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
    }
    .period-tab:hover {
      border-color: var(--bc-hover);
      color: var(--text-secondary);
    }
    .period-tab.active {
      background: var(--accent-dim);
      border-color: var(--accent-border);
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(184,146,58,0.15);
    }

    /* ── Main Layout ── */
    .rd-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-xl);
      align-items: start;
      margin-top: var(--sp-xl);
    }

    /* ── Chart Container ── */
    .chart-wrap {
      background: var(--bg-card);
      border: var(--border-base);
      border-radius: var(--radius-lg);
      padding: var(--sp-lg);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card);
    }

    /* ── Competency Detail List ── */
    .comp-detail { display: flex; flex-direction: column; gap: 10px; }
    .comp-row {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }
    .comp-color-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .comp-row-name { font-size: var(--fs-sm); flex: 1; }
    .comp-row-score {
      font-size: var(--fs-sm);
      font-weight: var(--fw-bold);
      min-width: 36px;
      text-align: right;
    }
    .comp-row-bar-wrap {
      width: 80px;
      height: 3px;
      background: var(--track-bg);
      border-radius: var(--radius-pill);
      overflow: hidden;
    }
    .comp-row-bar { height: 100%; border-radius: var(--radius-pill); }

    /* ── Legend ── */
    .chart-legend {
      display: flex;
      gap: var(--sp-md);
      margin-top: var(--sp-md);
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--fs-xs);
      color: var(--text-secondary);
    }
    .legend-line {
      width: 20px; height: 2px;
      border-radius: 1px;
    }
    .legend-line-prev { background: color-mix(in srgb, var(--comp-1) 60%, transparent); }

    @media (max-width: 640px) {
      .rd-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="rd-header">
  <div class="rd-title">역량 레이더</div>
  <div class="rd-sub">12역량 수준 시각화 — 차수별 성장 추이</div>
  <div class="period-tabs">
    <button class="period-tab active">현재</button>
    <button class="period-tab">1차 (3월)</button>
    <button class="period-tab">2차 (4월)</button>
  </div>
</div>

<div class="rd-layout">
  <div>
    <div class="chart-wrap">
      <canvas id="radarChart" aria-label="12역량 성장 레이더 차트" role="img"></canvas>
    </div>
    <div class="chart-legend">
      <div class="legend-item">
        <div class="legend-line" style="background:var(--accent)" aria-hidden="true"></div>현재 (5월)
      </div>
      <div class="legend-item">
        <div class="legend-line legend-line-prev" aria-hidden="true"></div>1차 (3월)
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">역량별 점수</div>
    <div class="comp-detail" id="compDetail"></div>
  </div>
</div>

<script>
(async()=>{try{const r=await fetch('/api/auth/me',{credentials:'include'});if(!r.ok)location.href='login.html';}catch(e){location.href='login.html';}})();
const BASE='https://sbi.3.39.80.158.nip.io';
const uid=new URLSearchParams(location.search).get('u')||'learner-demo';
const KEYS=['strategic_thinking','decision_making','organizational_influence','conflict_resolution','communication','collaboration','coaching','execution','problem_solving','change_leadership','results_orientation','self_awareness'];
const css=getComputedStyle(document.documentElement);
const cv=k=>css.getPropertyValue(k).trim();
const alpha=(v,a)=>{const h=cv(v);return `rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${a})`;};
const competencies=[
  {name:'전략적 사고',varName:'--comp-1',cur:78,prev:62},
  {name:'의사결정',varName:'--comp-2',cur:70,prev:55},
  {name:'영향력',varName:'--comp-3',cur:88,prev:74},
  {name:'갈등 해결',varName:'--comp-4',cur:48,prev:40},
  {name:'커뮤니케이션',varName:'--comp-5',cur:92,prev:80},
  {name:'팀 리더십',varName:'--comp-6',cur:65,prev:50},
  {name:'코칭·육성',varName:'--comp-7',cur:75,prev:60},
  {name:'실행력',varName:'--comp-8',cur:95,prev:85},
  {name:'혁신·창의',varName:'--comp-9',cur:35,prev:28},
  {name:'조직이해',varName:'--comp-10',cur:55,prev:45},
  {name:'고객지향',varName:'--comp-11',cur:73,prev:60},
  {name:'자기개발',varName:'--comp-12',cur:25,prev:20},
].map(c=>({...c,color:cv(c.varName)}));
const aB=alpha('--accent',0.9),aF=alpha('--accent',0.12),pB=alpha('--comp-1',0.5),pF=alpha('--comp-1',0.05),pP=alpha('--comp-1',0.6);
const chart=new Chart(document.getElementById('radarChart').getContext('2d'),{
  type:'radar',
  data:{labels:competencies.map(c=>c.name),datasets:[
    {label:'현재 (5월)',data:competencies.map(c=>c.cur),borderColor:aB,backgroundColor:aF,borderWidth:2,pointBackgroundColor:aB,pointRadius:3},
    {label:'1차 (3월)',data:competencies.map(c=>c.prev),borderColor:pB,backgroundColor:pF,borderWidth:1.5,borderDash:[4,3],pointBackgroundColor:pP,pointRadius:2},
  ]},
  options:{responsive:true,scales:{r:{min:0,max:100,ticks:{display:false,stepSize:25},grid:{color:'rgba(0,0,0,0.08)'},angleLines:{color:'rgba(0,0,0,0.08)'},pointLabels:{color:alpha('--text-primary',0.75),font:{family:'Pretendard',size:11}}}},plugins:{legend:{display:false}}},
});
function renderDetail(){
  const d=document.getElementById('compDetail'); d.innerHTML='';
  competencies.forEach(c=>{
    const delta=c.cur-c.prev;
    const dc=delta>0?'var(--comp-3)':delta<0?'var(--comp-5)':'var(--text-muted)';
    d.insertAdjacentHTML('beforeend',`<div class="comp-row"><div class="comp-color-dot" style="background:${c.color}" aria-hidden="true"></div><div class="comp-row-name">${c.name}</div><div class="comp-row-bar-wrap"><div class="comp-row-bar" style="width:${c.cur}%;background:${c.color}"></div></div><div class="comp-row-score">${c.cur}<span style="font-size:9px;color:${dc};margin-left:3px">${delta>0?'+':''}${delta}</span></div></div>`);
  });
}
renderDetail();
document.querySelectorAll('.period-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.period-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');});});
(async()=>{
  try{
    const d=await(await fetch(`${BASE}/api/stats/learner/${uid}`)).json();
    KEYS.forEach((k,i)=>{if(d.competencies?.[k]!=null)competencies[i].cur=Math.round(d.competencies[k]*100);});
    chart.data.datasets[0].data=competencies.map(c=>c.cur);
    chart.update();
    renderDetail();
  }catch(e){}
})();
</script>
</body>
</html>
