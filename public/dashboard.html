<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DC — 나의 성장 대시보드</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { padding: var(--sp-lg) var(--sp-lg) var(--sp-xl); max-width: 1000px; margin: 0 auto; }
    .top-bar { display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-xl);padding-bottom:var(--sp-md);border-bottom:var(--border-base); }
    .user-greeting { font-size:var(--fs-lg);font-weight:var(--fw-bold); }
    .user-sub { font-size:var(--fs-sm);color:var(--text-secondary);margin-top:2px; }
    .level-chip { display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--accent-dim);border:var(--border-accent);border-radius:var(--radius-pill);font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--accent);box-shadow:0 2px 8px rgba(184,146,58,0.15); }
    .dash-grid { display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md); }
    .dash-col-wide { grid-column:span 2; }
    .d-card { background:var(--bg-card);border:var(--border-base);border-radius:var(--radius-lg);padding:var(--sp-lg);box-shadow:var(--shadow-card); }
    .d-card-title { font-size:var(--fs-xs);font-weight:var(--fw-medium);text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:var(--sp-md);display:flex;align-items:center;gap:6px; }
    .xp-meta { display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--sp-sm); }
    .xp-total { font-size:var(--fs-xl);font-weight:var(--fw-bold);color:var(--accent); }
    .xp-max   { font-size:var(--fs-sm);color:var(--text-muted); }
    .xp-track { height:10px;background:var(--track-bg);border-radius:var(--radius-pill);overflow:hidden; }
    .xp-fill  { height:100%;border-radius:var(--radius-pill);background:linear-gradient(90deg,var(--accent) 0%,var(--accent-light) 100%);box-shadow:var(--shadow-glow-sm);transition:width 0.8s var(--ease-out); }
    .xp-next  { font-size:var(--fs-xs);color:var(--text-muted);margin-top:6px;text-align:right; }
    .challenge-list { display:flex;flex-direction:column;gap:10px; }
    .challenge-item { display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-sm) var(--sp-md);background:var(--bg-base);border-radius:var(--radius-md);border:var(--border-base); }
    .ch-status { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
    .ch-info { flex:1; }
    .ch-name { font-size:var(--fs-sm);font-weight:var(--fw-medium); }
    .ch-prog { font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px; }
    .ch-xp   { font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--accent);flex-shrink:0; }
    .sim-recommend { display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-sm); }
    .sim-mini { background:var(--bg-base);border:var(--border-base);border-radius:var(--radius-md);padding:var(--sp-sm);text-align:center;cursor:pointer;transition:border-color var(--transition),box-shadow var(--transition); }
    .sim-mini:hover { border-color:var(--bc-hover);box-shadow:var(--shadow-card-hover); }
    .sim-mini-icon { font-size:22px;margin-bottom:6px;display:block; }
    .sim-mini-name { font-size:var(--fs-xs);font-weight:var(--fw-medium);line-height:1.3; }
    .growth-log { display:flex;flex-direction:column;gap:8px; }
    .log-item { display:flex;align-items:center;gap:var(--sp-sm); }
    .log-dot  { width:6px;height:6px;border-radius:50%;flex-shrink:0; }
    .log-text { font-size:var(--fs-sm);color:var(--text-secondary);flex:1; }
    .log-xp   { font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--accent); }
    @media(max-width:680px){.dash-grid{grid-template-columns:1fr;}.dash-col-wide{grid-column:span 1;}.sim-recommend{grid-template-columns:repeat(2,1fr);}}
  </style>
</head>
<body>

<header class="top-bar" role="banner">
  <div>
    <div class="user-greeting" id="userGreeting">안녕하세요 <i class="ph ph-hand-waving" aria-hidden="true" style="color:var(--accent)"></i></div>
    <div class="user-sub" id="userSub">AI DC 학습을 시작하세요</div>
  </div>
  <div class="level-chip" id="levelChip">
    <i class="ph ph-arrow-up" aria-hidden="true"></i>
    <span id="levelText">Lv.1</span>
  </div>
</header>

<main class="dash-grid" role="main">
  <div class="d-card dash-col-wide" aria-label="역량 XP 현황">
    <div class="d-card-title"><i class="ph ph-chart-line-up" aria-hidden="true"></i>나의 성장 현황</div>
    <div class="xp-meta">
      <span class="xp-total" id="xpTotal">0 XP</span>
      <span class="xp-max" id="xpMax">Lv.2까지 1,000 XP 남음</span>
    </div>
    <div class="xp-track" aria-label="XP 진행률"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div class="xp-next" id="xpNext">다음 레벨: 1,000 XP</div>
    <div style="margin-top:var(--sp-md);display:flex;gap:var(--sp-sm)">
      <a href="xp-bar.html" style="font-size:var(--fs-xs);color:var(--accent);text-decoration:none">역량 상세 보기 <i class="ph ph-arrow-right" aria-hidden="true"></i></a>
      <a href="radar.html" style="font-size:var(--fs-xs);color:var(--text-secondary);text-decoration:none;margin-left:var(--sp-md)">레이더 차트 <i class="ph ph-arrow-right" aria-hidden="true"></i></a>
    </div>
  </div>

  <div class="d-card" aria-label="이번 주 챌린지">
    <div class="d-card-title">
      <i class="ph ph-flag" aria-hidden="true"></i>이번 주 챌린지
      <span id="challengeCount" style="margin-left:auto;font-size:var(--fs-xs);color:var(--comp-3);font-weight:var(--fw-bold)">0/4 완료</span>
    </div>
    <div class="challenge-list" id="challengeList"></div>
    <a href="challenge.html" style="display:block;margin-top:var(--sp-md);font-size:var(--fs-xs);color:var(--accent);text-decoration:none">전체 챌린지 <i class="ph ph-arrow-right" aria-hidden="true"></i></a>
  </div>

  <div class="d-card" aria-label="성장 여정 리더보드">
    <div class="d-card-title"><i class="ph ph-ranking" aria-hidden="true"></i>동료 성장 현황</div>
    <div style="display:flex;align-items:center;gap:var(--sp-md);margin-bottom:var(--sp-sm)">
      <span style="font-size:var(--fs-2xl);font-weight:var(--fw-bold);color:var(--accent)" id="rankVal">—</span>
      <div><div style="font-size:var(--fs-sm);font-weight:var(--fw-medium)" id="rankSub">순위 집계 중</div><div style="font-size:var(--fs-xs);color:var(--text-muted)" id="rankNote">코호트에 배정되면 순위가 표시됩니다</div></div>
    </div>
    <a href="leaderboard.html" style="font-size:var(--fs-xs);color:var(--accent);text-decoration:none">전체 순위 보기 <i class="ph ph-arrow-right" aria-hidden="true"></i></a>
  </div>

  <div class="d-card dash-col-wide" aria-label="시뮬레이션 목록">
    <div class="d-card-title"><i class="ph ph-play-circle" aria-hidden="true"></i>AI 시뮬레이션</div>
    <div class="sim-recommend" id="simGrid"></div>
  </div>

  <div class="d-card" aria-label="최근 성장 기록">
    <div class="d-card-title"><i class="ph ph-clock-clockwise" aria-hidden="true"></i>최근 성장 기록</div>
    <div class="growth-log" id="growthLog"></div>
    <a href="badges.html" style="display:block;margin-top:var(--sp-md);font-size:var(--fs-xs);color:var(--accent);text-decoration:none">역량 뱃지 보기 <i class="ph ph-arrow-right" aria-hidden="true"></i></a>
  </div>
</main>

<script>
const BASE='https://sbi.3.39.80.158.nip.io';
const uid=new URLSearchParams(location.search).get('u')||'learner-demo';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const SIMS=[{name:'AI In-Basket',icon:'ph-tray',color:'var(--sim-inbasket)',id:'inbasket'},{name:'AI Role-Playing',icon:'ph-chats-circle',color:'var(--sim-roleplay)',id:'roleplay'},{name:'AI Presentation',icon:'ph-projector-screen',color:'var(--sim-pres)',id:'canvas'},{name:'AI GD',icon:'ph-users-three',color:'var(--sim-gd)',id:'gd'}];
const SIM_CHALLENGES=[{id:'inbasket',name:'AI In-Basket 완료',xp:80},{id:'roleplay',name:'AI Role-Playing 완료',xp:100},{id:'gd',name:'AI GD 완료',xp:120},{id:'canvas',name:'AI Presentation 완료',xp:90}];
SIMS.forEach(s=>{document.getElementById('simGrid').insertAdjacentHTML('beforeend',`<div class="sim-mini" tabindex="0" role="button" aria-label="${s.name} 시작"><i class="ph ${s.icon} sim-mini-icon" style="color:${s.color}" aria-hidden="true"></i><div class="sim-mini-name">${s.name}</div></div>`);});
let logs=[{name:'학습을 시작하세요',comp:'성장',xp:0,color:'var(--accent)'}];
function renderLogs(){const gl=document.getElementById('growthLog');gl.innerHTML='';logs.forEach(l=>{gl.insertAdjacentHTML('beforeend',`<div class="log-item"><div class="log-dot" style="background:${l.color}" aria-hidden="true"></div><div class="log-text">${esc(l.name)} <span style="color:var(--text-muted)">· ${esc(l.comp)}</span></div>${l.xp?`<div class="log-xp">+${l.xp} XP</div>`:''}</div>`);});}
function renderChallenges(completed){
  const cl=document.getElementById('challengeList');cl.innerHTML='';
  const done=SIM_CHALLENGES.filter(c=>completed.includes(c.id)).length;
  document.getElementById('challengeCount').textContent=`${done}/${SIM_CHALLENGES.length} 완료`;
  SIM_CHALLENGES.forEach(c=>{
    const isDone=completed.includes(c.id);
    const color=isDone?'var(--comp-3)':'var(--accent)';
    cl.insertAdjacentHTML('beforeend',`<div class="challenge-item"><div class="ch-status" style="background:${color}" aria-hidden="true"></div><div class="ch-info"><div class="ch-name">${c.name}</div><div class="ch-prog">${isDone?'완료':'미완료'}</div></div><div class="ch-xp">${isDone?'+'+c.xp+' XP':'진행 중'}</div></div>`);
  });
}
renderChallenges([]);
renderLogs();
(async()=>{
  try{
    const me=await(await fetch('/api/auth/me',{credentials:'include'})).json();
    const name=me.user?.name||'학습자';
    document.getElementById('userGreeting').innerHTML=`안녕하세요, ${esc(name)}님 <i class="ph ph-hand-waving" aria-hidden="true" style="color:var(--accent)"></i>`;
    document.getElementById('userSub').textContent='AI DC 학습을 시작하세요';
  }catch(e){}
  try{
    const d=await(await fetch(`${BASE}/api/stats/learner/${uid}`)).json();
    const xp=d.xp||0,level=d.level||1,nextXp=level*1000;
    document.getElementById('xpTotal').textContent=xp.toLocaleString()+' XP';
    document.getElementById('xpMax').textContent=`Lv.${level+1}까지 ${(nextXp-xp).toLocaleString()} XP 남음`;
    document.getElementById('xpFill').style.width=Math.min((xp%1000)/10,100)+'%';
    document.getElementById('xpNext').textContent=`다음 레벨: ${nextXp.toLocaleString()} XP`;
    document.getElementById('levelText').textContent=`Lv.${level} 성장 중`;
    renderChallenges(d.completedSimulations||[]);
    if(d.recentStatements?.length)logs=d.recentStatements.slice(0,3).map(s=>({name:`${s.sim||''} ${s.verb||''}`.trim()||'학습 완료',comp:'성장',xp:s.score||10,color:'var(--accent)'}));
    renderLogs();
  }catch(e){requestAnimationFrame(()=>{document.getElementById('xpFill').style.width='0%';});}
  try{
    const c=await(await fetch(`${BASE}/api/stats/cohort/all`)).json();
    const board=c.leaderboard||[];
    const idx=board.findIndex(l=>l.userId===uid);
    if(idx>=0){
      const rank=idx+1,total=c.totalLearners||board.length;
      const pct=Math.round((1-idx/Math.max(total-1,1))*100);
      document.getElementById('rankVal').textContent=`${rank}위`;
      document.getElementById('rankSub').textContent=`${total}명 중 상위 ${pct}%`;
      document.getElementById('rankNote').textContent='leaderboard.html에서 전체 순위 확인';
    }
  }catch(e){}
})();
</script>
</body>
</html>
