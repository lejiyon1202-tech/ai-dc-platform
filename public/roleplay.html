<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DC — AI Role-Playing</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { padding: 0; margin: 0; display: flex; flex-direction: column; height: 100vh; }

    /* ── Top Bar ── */
    .sim-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-sm) var(--sp-lg);
      background: var(--bg-card);
      border-bottom: var(--border-base);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }
    .sim-title-wrap { display: flex; align-items: center; gap: var(--sp-sm); }
    .sim-type-badge {
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: var(--fs-xs); font-weight: var(--fw-medium);
      background: color-mix(in srgb, var(--sim-roleplay) 12%, transparent);
      color: var(--sim-roleplay);
      border: 1px solid color-mix(in srgb, var(--sim-roleplay) 30%, transparent);
    }
    .sim-title { font-size: var(--fs-base); font-weight: var(--fw-bold); }

    /* ── Emotion Stage ── */
    .emotion-stages {
      display: flex; gap: 4px; align-items: center;
    }
    .stage-item {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      font-size: var(--fs-xs);
      border: var(--border-base);
      background: var(--bg-base);
      color: var(--text-muted);
    }
    .stage-item.current {
      background: var(--accent-dim);
      border-color: var(--accent-border);
      color: var(--accent);
      font-weight: var(--fw-medium);
    }
    .stage-item.done {
      background: color-mix(in srgb, var(--comp-3) 10%, transparent);
      border-color: color-mix(in srgb, var(--comp-3) 30%, transparent);
      color: var(--comp-3);
    }
    .stage-arrow { color: var(--text-muted); font-size: 10px; }

    /* ── Scenario Info ── */
    .scenario-bar {
      padding: var(--sp-sm) var(--sp-lg);
      background: var(--bg-base);
      border-bottom: var(--border-base);
      display: flex; align-items: center; gap: var(--sp-md);
      flex-shrink: 0;
    }
    .scenario-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: var(--border-accent);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--fs-sm); font-weight: var(--fw-bold); color: var(--accent);
      flex-shrink: 0;
    }
    .scenario-info { flex: 1; }
    .scenario-name { font-size: var(--fs-sm); font-weight: var(--fw-bold); }
    .scenario-role { font-size: var(--fs-xs); color: var(--text-muted); }
    .impact-badge {
      padding: 4px 10px;
      background: var(--accent-dim); border: var(--border-accent);
      border-radius: var(--radius-pill);
      font-size: var(--fs-xs); font-weight: var(--fw-medium);
      color: var(--accent);
    }

    /* ── Chat Area ── */
    .chat-area { flex: 1; overflow-y: auto; padding: var(--sp-lg); display: flex; flex-direction: column; gap: var(--sp-md); }

    .bubble-wrap { display: flex; gap: var(--sp-sm); max-width: 72%; }
    .bubble-wrap.user-wrap { margin-left: auto; flex-direction: row-reverse; }

    .bubble-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--fs-xs); font-weight: var(--fw-bold);
      flex-shrink: 0; margin-top: 4px;
    }
    .bubble-avatar.ai-av { background: var(--accent-dim); color: var(--accent); }
    .bubble-avatar.user-av { background: var(--comp-1); color: var(--text-on-accent); }

    .bubble {
      padding: var(--sp-sm) var(--sp-md);
      border-radius: var(--radius-lg);
      font-size: var(--fs-sm); line-height: 1.7;
      box-shadow: var(--shadow-sm);
    }
    .ai-bubble {
      background: var(--bg-card);
      border: var(--border-base);
      border-top-left-radius: 4px;
    }
    .user-bubble {
      background: var(--comp-1);
      color: var(--text-on-accent);
      border-top-right-radius: 4px;
    }

    .bubble-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .bubble-wrap.user-wrap .bubble-meta { text-align: right; }

    /* ── Evaluation Hint ── */
    .eval-hint {
      padding: var(--sp-sm) var(--sp-md);
      background: var(--accent-dim);
      border: var(--border-accent);
      border-radius: var(--radius-md);
      font-size: var(--fs-xs); color: var(--accent);
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Input Area ── */
    .input-area {
      padding: var(--sp-md) var(--sp-lg);
      background: var(--bg-card);
      border-top: var(--border-base);
      flex-shrink: 0;
    }
    .input-toolbar {
      display: flex; gap: 6px;
      margin-bottom: var(--sp-sm);
      flex-wrap: wrap;
    }
    .quick-btn {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: var(--fs-xs);
      border: var(--border-base);
      background: var(--bg-base);
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
    }
    .quick-btn:hover { border-color: var(--bc-hover); background: var(--bg-card-hover); }
    .input-row { display: flex; gap: var(--sp-sm); align-items: flex-end; }
    .chat-input {
      flex: 1;
      padding: 10px 14px;
      border: var(--border-base);
      border-radius: var(--radius-md);
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: var(--fs-sm);
      font-family: var(--font-base);
      resize: none; height: 44px; line-height: 1.5;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .chat-input:focus {
      outline: none;
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .send-btn {
      width: 44px; height: 44px; border-radius: var(--radius-md);
      background: var(--accent); color: var(--text-on-accent);
      border: none; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity var(--transition);
    }
    .send-btn:hover { opacity: 0.88; }
  </style>
</head>
<body>

<!-- 상단 바 -->
<header class="sim-topbar" role="banner">
  <div class="sim-title-wrap">
    <span class="sim-type-badge" aria-label="시뮬레이션 유형">AI Role-Playing</span>
    <span class="sim-title">코칭 트레이너 시뮬레이션</span>
  </div>
  <div class="emotion-stages" role="region" aria-label="감정 단계 진행">
    <span class="stage-item done" aria-label="방어 단계 완료">
      <i class="ph ph-shield" aria-hidden="true"></i> 방어
    </span>
    <span class="stage-arrow" aria-hidden="true">›</span>
    <span class="stage-item current" aria-label="현재 단계: 저항">
      <i class="ph ph-warning" aria-hidden="true"></i> 저항
    </span>
    <span class="stage-arrow" aria-hidden="true">›</span>
    <span class="stage-item" aria-label="수용 단계 미도달">
      <i class="ph ph-check-circle" aria-hidden="true"></i> 수용
    </span>
  </div>
  <div style="font-size:var(--fs-xs);color:var(--text-muted)">KST 2026-05-20</div>
</header>

<!-- 시나리오 정보 -->
<div class="scenario-bar" role="region" aria-label="시나리오 정보">
  <div class="scenario-avatar" aria-hidden="true">김</div>
  <div class="scenario-info">
    <div class="scenario-name">김현수 팀원</div>
    <div class="scenario-role">영업2팀 · 최근 성과 목표 미달 상황</div>
  </div>
  <div class="impact-badge" aria-label="현재 영향력 비율 0.45">
    <i class="ph ph-chart-line-up" aria-hidden="true"></i>
    Impact 0.45
  </div>
</div>

<!-- 대화 영역 -->
<main class="chat-area" id="chatArea" role="log" aria-label="대화 내용" aria-live="polite"></main>

<!-- 입력 영역 -->
<footer class="input-area">
  <div class="eval-hint" role="status" aria-live="polite">
    <i class="ph ph-lightbulb" aria-hidden="true"></i>
    현재 저항 단계 — 팀원의 감정을 인정하고 공감적 질문으로 전환을 유도하세요
  </div>
  <div class="input-toolbar" aria-label="빠른 발화 제안">
    <button class="quick-btn" type="button" aria-label="빠른 발화: 공감">공감 표현</button>
    <button class="quick-btn" type="button" aria-label="빠른 발화: 열린 질문">열린 질문</button>
    <button class="quick-btn" type="button" aria-label="빠른 발화: 구체적 행동 확인">구체적 행동 확인</button>
    <button class="quick-btn" type="button" aria-label="빠른 발화: 강점 인정">강점 인정</button>
  </div>
  <div class="input-row">
    <textarea
      id="chatInput"
      class="chat-input"
      placeholder="팀원에게 하고 싶은 말을 입력하세요..."
      aria-label="발화 입력"
      aria-required="true"
      rows="1"
    ></textarea>
    <button id="sendBtn" class="send-btn" aria-label="발화 전송">
      <i class="ph ph-paper-plane-right" aria-hidden="true"></i>
    </button>
  </div>
</footer>

<script>
const messages = [
  { role:'ai', text:'팀장님, 지금 좀 바쁘신 건 아닌가요? 갑자기 부르셔서 긴장됐습니다.', time:'14:05', stage:'방어' },
  { role:'user', text:'김현수 씨, 오늘 이야기하고 싶었어요. 요즘 어떻게 지내고 있어요?', time:'14:05' },
  { role:'ai', text:'뭐... 그냥 그렇습니다. 솔직히 요즘 목표 숫자가 너무 압박이에요. 제가 열심히 안 한 것도 아닌데 왜 이렇게 숫자가 안 나오는지 모르겠어요.', time:'14:06', stage:'저항' },
];

const chatArea = document.getElementById('chatArea');

function addMessage(msg) {
  const isUser = msg.role === 'user';
  const avatarText = isUser ? '나' : '김';
  const avatarCls = isUser ? 'user-av' : 'ai-av';
  const bubbleCls = isUser ? 'user-bubble' : 'ai-bubble';
  const wrapCls = isUser ? 'bubble-wrap user-wrap' : 'bubble-wrap';

  chatArea.insertAdjacentHTML('beforeend', `
    <div class="${wrapCls}" role="article" aria-label="${isUser ? '나의 발화' : '팀원 발화'}">
      <div class="bubble-avatar ${avatarCls}" aria-hidden="true">${avatarText}</div>
      <div>
        <div class="bubble ${bubbleCls}">${msg.text}</div>
        <div class="bubble-meta">${msg.time}${msg.stage ? ` · ${msg.stage}` : ''}</div>
      </div>
    </div>`);
  chatArea.scrollTop = chatArea.scrollHeight;
}

messages.forEach(addMessage);

document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  addMessage({ role:'user', text, time: new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) });
  input.value = '';
});

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('sendBtn').click();
  }
});
</script>
</body>
</html>
