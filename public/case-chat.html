<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DC — 케이스 만들기</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { min-height:100vh; display:flex; flex-direction:column; padding:0; margin:0; background:var(--bg-base); }

    .cc-header { display:flex; align-items:center; gap:var(--sp-md); padding:var(--sp-md) var(--sp-lg); border-bottom:var(--border-base); background:var(--bg-card); flex-shrink:0; }
    .cc-back { width:36px;height:36px;border:var(--border-base);border-radius:var(--radius-md);background:var(--bg-base);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all var(--transition); }
    .cc-back:hover { border-color:var(--bc-hover); }
    .cc-title { font-size:var(--fs-base);font-weight:var(--fw-bold);flex:1; }
    .progress-steps { display:flex; gap:6px; align-items:center; }
    .step-dot { width:8px;height:8px;border-radius:50%;background:var(--track-bg);transition:background var(--transition); }
    .step-dot.active { background:var(--accent); }
    .step-dot.done { background:color-mix(in srgb,var(--accent) 50%,transparent); }

    .cc-msgs { flex:1; overflow-y:auto; padding:var(--sp-lg); display:flex; flex-direction:column; gap:var(--sp-md); }
    .msg-row { display:flex; gap:var(--sp-sm); align-items:flex-end; }
    .msg-row.user { flex-direction:row-reverse; }

    /* 아바타 — AI: 골드 accent + robot 아이콘 / 학습자: 이름 첫 글자 */
    .msg-avatar { width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .msg-avatar.ai { background:linear-gradient(135deg,var(--accent-dim),rgba(184,146,58,0.22));border:1.5px solid var(--accent-border);color:var(--accent);font-size:20px;box-shadow:0 2px 8px rgba(184,146,58,0.18); }
    .msg-avatar.user { background:var(--bg-card);border:var(--border-base);color:var(--text-secondary);font-size:var(--fs-sm);font-weight:var(--fw-bold); }

    .msg-bubble { max-width:72%;padding:var(--sp-sm) var(--sp-md);border-radius:var(--radius-lg);font-size:var(--fs-base);line-height:1.6; }
    .msg-bubble.ai { background:var(--bg-card);border:var(--border-base);border-bottom-left-radius:4px; }
    .msg-bubble.user { background:var(--accent);color:var(--text-on-accent);border-bottom-right-radius:4px; }
    .msg-typing { display:flex;gap:4px;padding:10px 14px; }
    .typing-dot { width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:typing 1.2s infinite; }
    .typing-dot:nth-child(2){animation-delay:.2s;}.typing-dot:nth-child(3){animation-delay:.4s;}
    @keyframes typing{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

    /* Quick Reply — msgs 내부 인라인, AI 버블 아래 바로 붙음 */
    .qr-row { display:flex;flex-wrap:wrap;gap:8px;padding-left:48px;margin-top:-6px; }
    .qr-chip { padding:6px 16px;border-radius:var(--radius-pill);border:var(--border-base);background:var(--bg-card);font-size:var(--fs-sm);cursor:pointer;transition:all var(--transition);color:var(--text-secondary); }
    .qr-chip:hover { border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim); }

    .cc-preview { margin:var(--sp-sm) var(--sp-lg);background:var(--bg-card);border:var(--border-accent);border-radius:var(--radius-lg);padding:var(--sp-md) var(--sp-lg);box-shadow:var(--shadow-glow);display:none;flex-shrink:0; }
    .preview-title { font-size:var(--fs-xs);font-weight:var(--fw-medium);color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:var(--sp-sm); }
    .preview-body { font-size:var(--fs-base);color:var(--text-secondary);line-height:1.6;white-space:pre-wrap; }
    .preview-actions { display:flex;gap:var(--sp-sm);margin-top:var(--sp-md);flex-wrap:wrap; }
    .btn-sim { padding:8px 18px;border-radius:var(--radius-pill);border:none;background:var(--accent);color:var(--text-on-accent);font-size:var(--fs-sm);font-weight:var(--fw-bold);cursor:pointer;transition:opacity var(--transition); }
    .btn-sim:hover{opacity:.88;} .btn-sim:disabled{opacity:.4;}
    .btn-retry { padding:8px 16px;border-radius:var(--radius-pill);border:var(--border-base);background:var(--bg-base);color:var(--text-secondary);font-size:var(--fs-sm);cursor:pointer; }

    .cc-input-area { padding:var(--sp-sm) var(--sp-lg) var(--sp-md);border-top:var(--border-base);background:var(--bg-card);display:flex;gap:var(--sp-sm);align-items:flex-end;flex-shrink:0; }
    .cc-input { flex:1;resize:none;border:var(--border-base);border-radius:var(--radius-md);padding:10px 14px;font-size:var(--fs-sm);font-family:var(--font-base);background:var(--bg-base);color:var(--text-primary);min-height:44px;max-height:120px;transition:border-color var(--transition); }
    .cc-input:focus{outline:none;border-color:var(--accent-border);}
    .btn-send { width:44px;height:44px;border:none;border-radius:var(--radius-md);background:var(--accent);color:var(--text-on-accent);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:opacity var(--transition); }
    .btn-send:disabled{opacity:.4;cursor:default;} .btn-send:not(:disabled):hover{opacity:.88;}
  </style>
</head>
<body>

<header class="cc-header">
  <button class="cc-back" onclick="history.back()" aria-label="뒤로가기"><i class="ph ph-arrow-left"></i></button>
  <div class="cc-title">케이스 만들기</div>
  <div class="progress-steps" id="progressSteps" aria-label="진행 단계">
    <div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div>
  </div>
</header>

<div class="cc-msgs" id="msgs"></div>

<div class="cc-preview" id="preview">
  <div class="preview-title"><i class="ph ph-note-pencil"></i> 케이스 미리보기</div>
  <div class="preview-body" id="previewBody"></div>
  <div class="preview-actions">
    <button class="btn-sim" id="btnStart"><i class="ph ph-play-circle"></i> InBasket으로 시작</button>
    <button class="btn-retry" id="btnRetry"><i class="ph ph-arrow-clockwise"></i> 처음부터</button>
  </div>
</div>

<div class="cc-input-area">
  <textarea id="ccInput" class="cc-input" placeholder="자유롭게 입력하세요..." rows="1" aria-label="메시지 입력"></textarea>
  <button id="btnSend" class="btn-send" disabled aria-label="전송"><i class="ph ph-paper-plane-tilt"></i></button>
</div>

<script>
const BASE='https://sbi.3.39.80.158.nip.io';
const uid=new URLSearchParams(location.search).get('u')||'learner-demo';
const msgs=document.getElementById('msgs');
const input=document.getElementById('ccInput');
const btnSend=document.getElementById('btnSend');
const preview=document.getElementById('preview');
let convHistory=[];let caseData=null;let step=0;const STEPS=7;
let learnerInfo={};

const QR_STEPS=[
  ['사원·대리','과장','차장','부장','임원·팀장','기타'],
  ['제조','금융','IT','유통·서비스','공공·교육','기타'],
  ['의사결정·우선순위','팀원 코칭','갈등 조율','이해관계자 관리','기타'],
  ['약점 보완','강점 심화','승진 준비','실전 대비','기타'],
];
let qrStep=0;

function updateProgress(){
  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.className='step-dot'+(i<step?' done':i===step?' active':'');
  });
}

function clearQR(){ document.getElementById('qrRow')?.remove(); }

function showQR(chips){
  clearQR();
  if(!chips||!chips.length)return;
  const row=document.createElement('div');
  row.className='qr-row';row.id='qrRow';
  chips.forEach(v=>{
    const c=document.createElement('button');
    c.className='qr-chip';c.textContent=v;c.type='button';
    c.onclick=()=>{
      if(v==='기타'){clearQR();input.value='';input.placeholder='직접 입력하세요...';btnSend.disabled=true;input.focus();}
      else{input.value=v;input.style.height='auto';btnSend.disabled=false;input.focus();}
    };
    row.appendChild(c);
  });
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
}

function addBubble(role,text){
  const isAi=role==='assistant';
  const row=document.createElement('div');
  row.className='msg-row'+(isAi?'':' user');
  const avatarHtml=isAi
    ?'<i class="ph ph-robot" aria-hidden="true"></i>'
    :`<span aria-hidden="true">${(learnerInfo.name||'나').charAt(0)}</span>`;
  row.innerHTML=`<div class="msg-avatar ${isAi?'ai':'user'}">${avatarHtml}</div><div class="msg-bubble ${isAi?'ai':'user'}">${text.replace(/\n/g,'<br>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}</div>`;
  msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const row=document.createElement('div');row.className='msg-row';row.id='typingRow';
  row.innerHTML=`<div class="msg-avatar ai"><i class="ph ph-robot" aria-hidden="true"></i></div><div class="msg-bubble ai"><div class="msg-typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){document.getElementById('typingRow')?.remove();}

async function sendMessage(text){
  clearQR();btnSend.disabled=true;input.disabled=true;
  convHistory.push({role:'user',content:text});addBubble('user',text);showTyping();
  try{
    const endpoint=window._caseId?`/api/cases/${window._caseId}/chat`:'/api/cases/chat';
    const r=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,messages:convHistory,sessionId:uid,learnerInfo}),credentials:'include'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const ct=r.headers.get('content-type')||'';
    let full='';let finalData=null;
    if(ct.includes('event-stream')){
      hideTyping();
      const row=document.createElement('div');row.className='msg-row';
      row.innerHTML=`<div class="msg-avatar ai"><i class="ph ph-robot" aria-hidden="true"></i></div><div class="msg-bubble ai" id="streamBubble"></div>`;
      msgs.appendChild(row);
      const bubble=document.getElementById('streamBubble');
      const reader=r.body.getReader();const dec=new TextDecoder();
      while(true){const{done,value}=await reader.read();if(done)break;
        dec.decode(value,{stream:true}).split('\n').forEach(line=>{
          if(!line.startsWith('data: '))return;
          try{const p=JSON.parse(line.slice(6));
            if(p.chunk){full+=p.chunk;bubble.innerHTML=full.replace(/\[CASE_READY\]/g,'').replace(/\n/g,'<br>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');}
            if(p.done||p.caseReady)finalData=p;
          }catch(e){}
        });msgs.scrollTop=msgs.scrollHeight;}
    }else{const d=await r.json();hideTyping();full=(d.reply||'').replace('[CASE_READY]','').trim();finalData=d;addBubble('assistant',full);}
    const clean=full.replace('[CASE_READY]','').trim();
    convHistory.push({role:'assistant',content:clean});
    step=Math.min(step+1,STEPS-1);updateProgress();
    const chips=finalData?.quickReplies||(qrStep<QR_STEPS.length?QR_STEPS[qrStep]:null);
    if(chips){showQR(chips);if(!finalData?.quickReplies)qrStep++;}
    if(finalData?.caseReady&&finalData?.caseData){
      caseData=finalData.caseData;step=STEPS-1;updateProgress();clearQR();
      preview.style.display='block';document.getElementById('previewBody').textContent=typeof caseData==='string'?caseData:JSON.stringify(caseData,null,2);
      msgs.scrollTop=msgs.scrollHeight;
    }
  }catch(e){hideTyping();addBubble('assistant','죄송합니다. 잠시 후 다시 시도해주세요. ('+e.message+')');}
  input.disabled=false;input.value='';input.style.height='';
  if(!caseData)btnSend.disabled=false;input.focus();
}

document.getElementById('btnStart').addEventListener('click',async()=>{
  if(!caseData)return;document.getElementById('btnStart').disabled=true;
  try{
    const cid=window._caseId;
    const r=await fetch(cid?`/api/cases/${cid}/finalize`:'/api/cases/finalize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({caseData,simType:'inbasket'}),credentials:'include'});
    const d=await r.json();const caseId=d.caseId||cid;
    const tr=await fetch('/api/auth/iframe-token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({simId:'inbasket'}),credentials:'include'});
    const td=await tr.json();const token=td.token||'';
    location.href=`https://inbasket.3.39.80.158.nip.io?u=${encodeURIComponent(uid)}${token?'&token='+encodeURIComponent(token):''}${caseId?'&caseId='+encodeURIComponent(caseId):''}`;
  }catch(e){document.getElementById('btnStart').disabled=false;alert('시뮬 시작 실패');}
});

document.getElementById('btnRetry').addEventListener('click',()=>{
  convHistory=[];caseData=null;step=0;qrStep=0;updateProgress();
  msgs.innerHTML='';preview.style.display='none';clearQR();window._caseId=null;
  btnSend.disabled=false;startChat();
});

input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';btnSend.disabled=!input.value.trim();});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(input.value.trim())btnSend.click();}});
btnSend.addEventListener('click',()=>{const text=input.value.trim();if(!text)return;sendMessage(text);});

async function startChat(){
  try{
    const r=await fetch('/api/cases',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({simType:'inbasket',learnerInfo}),credentials:'include'});
    const d=await r.json();window._caseId=d.caseId;
  }catch(e){}
  const name=learnerInfo.name||'안녕하세요';
  addBubble('assistant',`${name.endsWith('님')?name:name+'님'}, 반갑습니다! AI DC 케이스 코치입니다. 😊\n\n인바스켓 시뮬레이션 케이스를 함께 만들어 볼게요.\n\n**먼저 현재 직급이나 역할을 알려주세요.** 아래 버튼을 선택하거나 직접 입력하셔도 됩니다.`);
  showQR(QR_STEPS[0]);qrStep=1;
  btnSend.disabled=false;input.focus();
}

(async()=>{
  try{const r=await fetch('/api/auth/me',{credentials:'include'});if(!r.ok){location.href='login.html';return;}const me=await r.json();if(!me.user){location.href='login.html';return;}learnerInfo.name=me.user.name||me.user.email||'학습자';learnerInfo.role=me.user.role||'learner';}catch(e){location.href='login.html';return;}
  try{const s=await(await fetch(`${BASE}/api/stats/learner/${uid}`)).json();learnerInfo.completedSims=s.completedSimulations||[];learnerInfo.xp=s.xp||0;learnerInfo.level=s.level||1;}catch(e){}
  await startChat();
})();
</script>
</body>
</html>
