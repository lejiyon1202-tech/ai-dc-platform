<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DC — 나의 성장 대시보드</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { padding: var(--sp-lg) var(--sp-lg) var(--sp-xl); max-width: 1000px; margin: 0 auto; }

    /* ── Top Bar ── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--sp-xl);
      padding-bottom: var(--sp-md);
      border-bottom: var(--border-base);
    }
    .user-greeting { font-size: var(--fs-lg); font-weight: var(--fw-bold); }
    .user-sub { font-size: var(--fs-sm); color: var(--text-secondary); margin-top: 2px; }
    .level-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      background: var(--accent-dim);
      border: var(--border-accent);
      border-radius: var(--radius-pill);
      font-size: var(--fs-sm);
      font-weight: var(--fw-bold);
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(184,146,58,0.15);
    }

    /* ── Layout Grid ── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-md);
    }
    .dash-col-wide { grid-column: span 2; }

    /* ── Card Base ── */
    .d-card {
      background: var(--bg-card);
      border: var(--border-base);
      border-radius: var(--radius-lg);
      padding: var(--sp-lg);
      box-shadow: var(--shadow-card);
    }
    .d-card-title {
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: var(--sp-md);
      display: flex; align-items: center; gap: 6px;
    }

    /* ── XP Bar Card ── */
    .xp-meta {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: var(--sp-sm);
    }
    .xp-total { font-size: var(--fs-xl); font-weight: var(--fw-bold); color: var(--accent); }
    .xp-max   { font-size: var(--fs-sm); color: var(--text-muted); }
    .xp-track {
      height: 10px; background: var(--track-bg);
      border-radius: var(--radius-pill); overflow: hidden;
    }
    .xp-fill {
      height: 100%;
      border-radius: var(--radius-pill);
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
      box-shadow: var(--shadow-glow-sm);
      transition: width 0.8s var(--ease-out);
    }
    .xp-next { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 6px; text-align: right; }

    /* ── Challenge List ── */
    .challenge-list { display: flex; flex-direction: column; gap: 10px; }
    .challenge-item {
      display: flex; align-items: center; gap: var(--sp-md);
      padding: var(--sp-sm) var(--sp-md);
      background: var(--bg-base);
      border-radius: var(--radius-md);
      border: var(--border-base);
    }
    .ch-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ch-info { flex: 1; }
    .ch-name { font-size: var(--fs-sm); font-weight: var(--fw-medium); }
    .ch-prog { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 2px; }
    .ch-xp   { font-size: var(--fs-xs); font-weight: var(--fw-bold); color: var(--accent); flex-shrink: 0; }

    /* ── Sim Recommend ── */
    .sim-recommend {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: var(--sp-sm);
    }
    .sim-mini {
      background: var(--bg-base);
      border: var(--border-base);
      border-radius: var(--radius-md);
      padding: var(--sp-sm);
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .sim-mini:hover { border-color: var(--bc-hover); box-shadow: var(--shadow-card-hover); }
    .sim-mini-icon {
      font-size: 22px;
      margin-bottom: 6px;
      display: block;
    }
    .sim-mini-name { font-size: var(--fs-xs); font-weight: var(--fw-medium); line-height: 1.3; }

    /* ── Growth Log ── */
    .growth-log { display: flex; flex-direction: column; gap: 8px; }
    .log-item {
      display: flex; align-items: center; gap: var(--sp-sm);
    }
    .log-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .log-text { font-size: var(--fs-sm); color: var(--text-secondary); flex: 1; }
    .log-xp { font-size: var(--fs-sm); font-weight: var(--fw-bold); color: var(--accent); }

    @media (max-width: 680px) {
      .dash-grid { grid-template-columns: 1fr; }
      .dash-col-wide { grid-column: span 1; }
      .sim-recommend { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header class="top-bar" role="banner">
  <div>
    <div class="user-greeting">안녕하세요, 김민준님 <i class="ph ph-hand-waving" aria-hidden="true" style="color:var(--accent)"></i></div>
    <div class="user-sub">영업2팀 팀장 · 오늘도 성장하는 하루 되세요</div>
  </div>
  <div class="level-chip">
    <i class="ph ph-arrow-up" aria-hidden="true"></i>
    Lv.7 성장 중
  </div>
</header>

<main class="dash-grid" role="main">

  <!-- XP 진행 -->
  <div class="d-card dash-col-wide" aria-label="역량 XP 현황">
    <div class="d-card-title">
      <i class="ph ph-chart-line-up" aria-hidden="true"></i>
      나의 성장 현황
    </div>
    <div class="xp-meta">
      <span class="xp-total">3,240 XP</span>
      <span class="xp-max">Lv.8까지 760 XP 남음</span>
    </div>
    <div class="xp-track" aria-label="XP 진행률 81퍼센트">
      <div class="xp-fill" id="xpFill" style="width:0%"></div>
    </div>
    <div class="xp-next">다음 레벨: 4,000 XP</div>
    <div style="margin-top:var(--sp-md);display:flex;gap:var(--sp-sm)">
      <a href="xp-bar.html" style="font-size:var(--fs-xs);color:var(--accent);text-decoration:none">
        역량 상세 보기 <i class="ph ph-arrow-right" aria-hidden="true"></i>
      </a>
      <a href="radar.html" style="font-size:var(--fs-xs);color:var(--text-secondary);text-decoration:none;margin-left:var(--sp-md)">
        레이더 차트 <i class="ph ph-arrow-right" aria-hidden="true"></i>
      </a>
    </div>
  </div>

  <!-- 주간 챌린지 -->
  <div class="d-card" aria-label="이번 주 챌린지">
    <div class="d-card-title">
      <i class="ph ph-flag" aria-hidden="true"></i>
      이번 주 챌린지
      <span style="margin-left:auto;font-size:var(--fs-xs);color:var(--comp-3);font-weight:var(--fw-bold)">3/5 완료</span>
    </div>
    <div class="challenge-list" id="challengeList"></div>
    <a href="challenge.html" style="display:block;margin-top:var(--sp-md);font-size:var(--fs-xs);color:var(--accent);text-decoration:none">
      전체 챌린지 <i class="ph ph-arrow-right" aria-hidden="true"></i>
    </a>
  </div>

  <!-- 리더보드 미니 -->
  <div class="d-card" aria-label="성장 여정 리더보드">
    <div class="d-card-title">
      <i class="ph ph-ranking" aria-hidden="true"></i>
      동료 성장 현황
    </div>
    <div style="display:flex;align-items:center;gap:var(--sp-md);margin-bottom:var(--sp-sm)">
      <span style="font-size:var(--fs-2xl);font-weight:var(--fw-bold);color:var(--accent)">7위</span>
      <div>
        <div style="font-size:var(--fs-sm);font-weight:var(--fw-medium)">24명 중 상위 29%</div>
        <div style="font-size:var(--fs-xs);color:var(--text-muted)">지난 주보다 +1 순위 상승</div>
      </div>
    </div>
    <a href="leaderboard.html" style="font-size:var(--fs-xs);color:var(--accent);text-decoration:none">
      전체 순위 보기 <i class="ph ph-arrow-right" aria-hidden="true"></i>
    </a>
  </div>

  <!-- 추천 시뮬 -->
  <div class="d-card dash-col-wide" aria-label="시뮬레이션 목록">
    <div class="d-card-title">
      <i class="ph ph-play-circle" aria-hidden="true"></i>
      AI 시뮬레이션
    </div>
    <div class="sim-recommend" id="simGrid"></div>
  </div>

  <!-- 최근 성장 기록 -->
  <div class="d-card" aria-label="최근 성장 기록">
    <div class="d-card-title">
      <i class="ph ph-clock-clockwise" aria-hidden="true"></i>
      최근 성장 기록
    </div>
    <div class="growth-log" id="growthLog"></div>
    <a href="badges.html" style="display:block;margin-top:var(--sp-md);font-size:var(--fs-xs);color:var(--accent);text-decoration:none">
      역량 뱃지 보기 <i class="ph ph-arrow-right" aria-hidden="true"></i>
    </a>
  </div>
</main>

<script>
const BASE='https://sbi.3.39.80.158.nip.io';
const uid=new URLSearchParams(location.search).get('u')||'learner-demo';
const challenges=[
  {name:'코칭 트레이너 2회 연속 완료',prog:'2/2',state:'done',xp:100},
  {name:'In-Basket 정확도 80%+',prog:'1/1',state:'done',xp:80},
  {name:'GD 발언 리드 3회',prog:'1/3',state:'active',xp:120},
];
const cl=document.getElementById('challengeList');
challenges.forEach(c=>{
  const color=c.state==='done'?'var(--comp-3)':'var(--accent)';
  cl.insertAdjacentHTML('beforeend',`<div class="challenge-item"><div class="ch-status" style="background:${color}" aria-hidden="true"></div><div class="ch-info"><div class="ch-name">${c.name}</div><div class="ch-prog">${c.prog} 달성</div></div><div class="ch-xp">+${c.xp} XP</div></div>`);
});
[{name:'AI In-Basket',icon:'ph-tray',color:'var(--sim-inbasket)'},{name:'AI Role-Playing',icon:'ph-chats-circle',color:'var(--sim-roleplay)'},{name:'AI Presentation',icon:'ph-projector-screen',color:'var(--sim-pres)'},{name:'AI GD',icon:'ph-users-three',color:'var(--sim-gd)'}].forEach(s=>{
  document.getElementById('simGrid').insertAdjacentHTML('beforeend',`<div class="sim-mini" tabindex="0" role="button" aria-label="${s.name} 시작"><i class="ph ${s.icon} sim-mini-icon" style="color:${s.color}" aria-hidden="true"></i><div class="sim-mini-name">${s.name}</div></div>`);
});
let logs=[
  {name:'코칭 트레이너 완료',comp:'코칭·육성',xp:50,color:'var(--comp-7)'},
  {name:'갈등 수용 단계 도달',comp:'갈등 해결',xp:30,color:'var(--comp-4)'},
  {name:'In-Basket 정확도 85%',comp:'의사결정',xp:40,color:'var(--comp-2)'},
];
function renderLogs(){
  const gl=document.getElementById('growthLog'); gl.innerHTML='';
  logs.forEach(l=>{gl.insertAdjacentHTML('beforeend',`<div class="log-item"><div class="log-dot" style="background:${l.color}" aria-hidden="true"></div><div class="log-text">${l.name} <span style="color:var(--text-muted)">· ${l.comp}</span></div><div class="log-xp">+${l.xp} XP</div></div>`);});
}
(async()=>{
  try{
    const d=await(await fetch(`${BASE}/api/stats/learner/${uid}`)).json();
    document.getElementById('xpFill').style.width=Math.min((d.xp||0)/4000*100,100)+'%';
    if(d.recentStatements?.length) logs=d.recentStatements.slice(0,3).map(s=>({name:`${s.sim} ${s.verb}`,comp:'성장',xp:s.score||10,color:'var(--accent)'}));
  }catch(e){requestAnimationFrame(()=>{document.getElementById('xpFill').style.width='81%';});}
  renderLogs();
})();
</script>
</body>
</html>
